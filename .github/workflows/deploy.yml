# GitHub Pages へのデプロイ
# 有効化手順（初回のみ）: リポジトリの Settings → Pages → Source を「GitHub Actions」にする。
# main へのpushで自動デプロイ。Actionsタブから任意のブランチで手動実行（Run workflow）も可能。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: サイトを組み立て（/ = ポータル, /runner/, /mancala/）
        run: |
          mkdir -p site/runner site/mancala
          cp -r portal/* site/
          cp -r games/runner-2d/dist/* site/runner/
          cp -r games/mancala/dist/* site/mancala/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
